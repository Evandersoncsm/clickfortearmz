name: Security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detectar segredos
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar segredos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
