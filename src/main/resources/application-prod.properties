# Producao deve falhar no boot se qualquer segredo obrigatorio estiver ausente.
spring.datasource.password=${DB_PASSWORD}

# Banco H2 em arquivo dentro do disco persistente do Render.
# DB_DIR aponta para o mount point do Persistent Disk (ex.: /data); sem disco
# os dados sao perdidos a cada deploy/restart. SPRING_DATASOURCE_URL ainda pode
# sobrescrever este valor por completo se necessario.
spring.datasource.url=jdbc:h2:file:${DB_DIR:/data}/contagemdb;AUTO_SERVER=TRUE
app.auth.username=${APP_AUTH_USERNAME}
app.auth.password=${APP_AUTH_PASSWORD}
app.crypto.password=${APP_CRYPTO_PASSWORD}
app.crypto.salt=${APP_CRYPTO_SALT}

# O console do banco e util apenas no desenvolvimento local.
spring.h2.console.enabled=false
spring.thymeleaf.cache=true
