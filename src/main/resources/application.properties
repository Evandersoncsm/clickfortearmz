spring.application.name=and

# Porta: usa a variável PORT da plataforma (Render/Railway) ou 8080 local
server.port=${PORT:8080}

# Limites de upload das planilhas
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Thymeleaf (cache ligado em produção via SPRING_THYMELEAF_CACHE=true)
spring.thymeleaf.cache=false

# Cache de recursos estáticos (CSS/JS) com hash no nome do arquivo.
# O navegador/CDN guardam por 1 ano; ao alterar um arquivo a URL muda
# automaticamente, então só o que mudou é rebaixado.
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Banco H2 em arquivo absoluto (persistente entre reinícios, independente do diretório de execução).
# Em container, sobrescreva com SPRING_DATASOURCE_URL apontando para um volume.
spring.datasource.url=jdbc:h2:file:${user.home}/.clickforte/contagemdb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Console H2 em /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Segredos: TODOS vêm de variáveis de ambiente em produção ───
# Os valores após ':' são apenas defaults de desenvolvimento local.
# Em produção (Render) defina as variáveis abaixo e NÃO use estes defaults.

# Login da área de Integrações
app.auth.username=${APP_AUTH_USERNAME:admin@local}
app.auth.password=${APP_AUTH_PASSWORD:dev-change-me}

# Chave de criptografia dos segredos das integrações (o salt aceita texto ou hexadecimal)
app.crypto.password=${APP_CRYPTO_PASSWORD:dev-crypto-change-me}
app.crypto.salt=${APP_CRYPTO_SALT:5c0744940b5c369b}

# OpenAPI/Swagger: documenta o contrato HTTP. O Try it out fica desligado porque
# os POSTs sao formularios MVC protegidos por CSRF e retornam redirecionamentos.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.document-title=ClickForte - Documentacao HTTP
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.try-it-out-enabled=false
